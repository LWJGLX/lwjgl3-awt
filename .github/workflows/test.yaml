name: test
on: [push, pull_request]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
    - name: Update Package Information
      run: sudo apt-get update
    - name: Install Dependencies
      run: sudo apt-get install -y git openjdk-8-jdk xvfb mesa*
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Cache Maven dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-maven-
    - name: Build with Maven
      run: |
        export XVFB_WHD="1920x1080x24"
        export DISPLAY=":99"
        export GALLIUM_DRIVER="llvmpipe"
        export LIBGL_ALWAYS_SOFTWARE="1"
        # Start Xvfb
        echo "Starting Xvfb"
        Xvfb :99 -ac -screen 0 "$XVFB_WHD" -nolisten tcp +extension GLX +render -noreset &
        Xvfb_pid="$!"
        echo "Waiting for Xvfb (PID: $Xvfb_pid) to be ready..."
        while ! xdpyinfo -display "${DISPLAY}" > /dev/null 2>&1; do
         		sleep 0.1
        done
        echo "Xvfb is running."

        ./mvnw -B test
    - name: Upload Images
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: images-linux
        path: 'target/*.png'
  test-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up JDK 8
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 8
          distribution: 'zulu'
          cache: maven
      - name: Download Mesa
        uses: carlosperate/download-file-action@7021d227a45dcf2f828612344b03f6f09a4f7cad # v2.0.3
        with:
          file-url: 'https://downloads.fdossena.com/geth.php?r=mesa64-latest'
          file-name: 'mesa64-latest.7z'
          location: '.'
      - name: Overwrite opengl32.dll with Mesa
        uses: DuckSoft/extract-7z-action@6eaaa506b410f047eaa9b22498696aad1e19a834 # v1.0
        with:
          pathSource: mesa64-latest.7z
          pathTarget: C:\WINDOWS\SYSTEM32\
      - name: Build with Maven
        run: ./mvnw -B test
      - name: Upload Images
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: images-windows
          path: 'target/*.png'
  test-macos:
    # macos-15 (Sequoia) shows a "bypass window picker" privacy dialog whenever
    # java.awt.Robot.createScreenCapture is invoked, which contaminates the
    # screenshot-comparison tests. Stay on macos-14 until the tests are
    # refactored to not rely on Robot screen capture.
    runs-on: macos-14
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up JDK 8
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 8
          distribution: 'zulu'
          cache: maven
      - name: Build with Maven
        run: ./mvnw -B test
      - name: Upload Images
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: images-macos
          path: 'target/*.png'
      - name: Collect native crash logs
        if: failure()
        run: |
          mkdir -p crash-logs
          # JVM fatal error logs
          cp -v hs_err_pid*.log crash-logs/ 2>/dev/null || true
          cp -v target/hs_err_pid*.log crash-logs/ 2>/dev/null || true
          # JVM crash replay files
          cp -v replay_pid*.log crash-logs/ 2>/dev/null || true
          cp -v target/replay_pid*.log crash-logs/ 2>/dev/null || true
          # macOS crash reporter writes per-process .ips files here
          if [ -d "$HOME/Library/Logs/DiagnosticReports" ]; then
            cp -rv "$HOME/Library/Logs/DiagnosticReports" crash-logs/user-DiagnosticReports 2>/dev/null || true
          fi
          if [ -d /Library/Logs/DiagnosticReports ]; then
            sudo cp -rv /Library/Logs/DiagnosticReports crash-logs/system-DiagnosticReports 2>/dev/null || true
          fi
          # Surefire fork dumps (.dump, .dumpstream, -jvmRun*.dump)
          if [ -d target/surefire-reports ]; then
            cp -rv target/surefire-reports crash-logs/surefire-reports 2>/dev/null || true
          fi
          echo "collected crash artifacts"
          ls -laR crash-logs || true
      - name: Upload crash logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: crash-logs-macos
          path: 'crash-logs/'
          if-no-files-found: warn
